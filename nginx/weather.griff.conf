# Nginx reverse proxy + static SPA config for weather.griff
# Drop this file into /etc/nginx/conf.d/weather.griff.conf (or include from nginx.conf).
#
# NOTE:
# - Replace "YOUR_TIMEZONEDB_KEY" and "YOUR_GOOGLE_ELEVATION_KEY" before production use.
# - Ensure your built frontend files are available at /usr/share/nginx/html.

# Shared cache for upstream API calls.
proxy_cache_path /var/cache/nginx/weather_api levels=1:2 keys_zone=weather_api_cache:50m max_size=1g inactive=30d use_temp_path=off;

server {
    listen 80;
    server_name weather.griffmathews.com;

    root /usr/share/nginx/html;
    index index.html;

    # Required by NOAA/Nominatim usage policies: always attach a User-Agent.
    proxy_set_header User-Agent "weather.griffmathews.com/1.0 (+https://weather.griffmathews.com)";
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # -------------------------
    # Static app caching policy
    # -------------------------

    # Aggressively cache build assets.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        try_files $uri =404;
    }


    # SPA fallback: serve index.html for unknown routes/404 with no caching.
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /index.html;
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }

    # -------------------------
    # API reverse proxy routes
    # -------------------------

    # REQUIRED: /api/position/search -> Nominatim search
    location = /api/position/search {
        proxy_cache weather_api_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=604800" always;
        proxy_pass https://nominatim.openstreetmap.org/search$is_args$args;
    }

    # REQUIRED: /api/position/reverse -> Nominatim reverse.php
    location = /api/position/reverse {
        proxy_cache weather_api_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=604800" always;
        proxy_pass https://nominatim.openstreetmap.org/reverse.php$is_args$args;
    }

    # REQUIRED: /api/timezone -> TimeZoneDB fallback API
    # Adds `key=...` automatically while preserving caller query params.
    location = /api/timezone {
        set $tzdb_key "YOUR_TIMEZONEDB_KEY";
        proxy_cache weather_api_cache;
        proxy_cache_valid 200 10m;
        proxy_cache_valid 404 1m;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=600" always;
        proxy_pass http://api.timezonedb.com/v2.1/get-time-zone?key=$tzdb_key&$args;
    }

    # REQUIRED: /api/openmeteo/{proxy+} -> api.open-meteo.com/v1/{proxy}
    location ~ ^/api/openmeteo/(.+)$ {
        proxy_cache weather_api_cache;
        proxy_cache_valid 200 10m;
        proxy_cache_valid 404 1m;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=600" always;
        proxy_pass https://api.open-meteo.com/v1/$1$is_args$args;
    }

    # OPTIONAL: /api/rap -> rucsoundings.noaa.gov/get_soundings.cgi
    location = /api/rap {
        proxy_cache weather_api_cache;
        proxy_cache_valid 200 10m;
        proxy_cache_valid 404 1m;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=600" always;
        proxy_pass https://rucsoundings.noaa.gov/get_soundings.cgi$is_args$args;
    }

    # OPTIONAL: /api/aviationweather -> aviationweather TAF API
    location = /api/aviationweather {
        proxy_cache weather_api_cache;
        proxy_cache_valid 200 10m;
        proxy_cache_valid 404 1m;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=600" always;
        proxy_pass https://www.aviationweather.gov/api/data/taf$is_args$args;
    }

    # OPTIONAL: /api/weather/{proxy+} -> api.weather.gov/{proxy}
    location ~ ^/api/weather/(.+)$ {
        proxy_cache weather_api_cache;
        proxy_cache_valid 200 10m;
        proxy_cache_valid 404 1m;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=600" always;
        proxy_pass https://api.weather.gov/$1$is_args$args;
    }

    # OPTIONAL: /api/pqs -> USGS EPQS elevation API
    location = /api/pqs {
        proxy_cache weather_api_cache;
        proxy_cache_valid 200 1d;
        proxy_cache_valid 404 1m;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=86400" always;
        proxy_pass https://epqs.nationalmap.gov/v1/json$is_args$args;
    }

    # OPTIONAL: /api/googleelevation -> Google Elevation API (backup)
    location = /api/googleelevation {
        set $google_elevation_key "YOUR_GOOGLE_ELEVATION_KEY";
        proxy_cache weather_api_cache;
        proxy_cache_valid 200 1d;
        proxy_cache_valid 404 1m;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=86400" always;
        proxy_pass https://maps.googleapis.com/maps/api/elevation/json?key=$google_elevation_key&$args;
    }

    # OPTIONAL: self-hosted services (adjust upstream host/port to match your deployment)
    location = /api/tfr {
        proxy_cache weather_api_cache;
        proxy_cache_valid 200 10m;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_pass http://127.0.0.1:8081$is_args$args;
    }

    location = /api/aviationalerts {
        proxy_cache weather_api_cache;
        proxy_cache_valid 200 10m;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_pass http://127.0.0.1:8082$is_args$args;
    }
}
